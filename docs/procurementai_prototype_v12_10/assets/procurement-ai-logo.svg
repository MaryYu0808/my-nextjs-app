<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ProcurementAI">
  <defs>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6" stop-opacity=".9"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity=".9"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#7C3AED" flood-opacity=".22"/>
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity=".28"/>
    </filter>
  </defs>

  <!-- stacked grid mark (transparent background) -->
  <g filter="url(#shadow)">
    <!-- bottom layer -->
    <g opacity=".22" transform="translate(8 12)">
      <rect x="14" y="10" width="10" height="10" rx="2" fill="#1B2542"/>
      <rect x="26" y="10" width="10" height="10" rx="2" fill="#1B2542"/>
      <rect x="38" y="10" width="10" height="10" rx="2" fill="#1B2542"/>
      <rect x="14" y="22" width="10" height="10" rx="2" fill="#1B2542"/>
      <rect x="26" y="22" width="10" height="10" rx="2" fill="#1B2542"/>
      <rect x="38" y="22" width="10" height="10" rx="2" fill="#1B2542"/>
      <rect x="14" y="34" width="10" height="10" rx="2" fill="#1B2542"/>
      <rect x="26" y="34" width="10" height="10" rx="2" fill="#1B2542"/>
      <rect x="38" y="34" width="10" height="10" rx="2" fill="#1B2542"/>
    </g>

    <!-- middle layer -->
    <g opacity=".35" transform="translate(4 6)">
      <rect x="14" y="10" width="10" height="10" rx="2" fill="#1C2A4E"/>
      <rect x="26" y="10" width="10" height="10" rx="2" fill="#1C2A4E"/>
      <rect x="38" y="10" width="10" height="10" rx="2" fill="#1C2A4E"/>
      <rect x="14" y="22" width="10" height="10" rx="2" fill="#1C2A4E"/>
      <rect x="26" y="22" width="10" height="10" rx="2" fill="#1C2A4E"/>
      <rect x="38" y="22" width="10" height="10" rx="2" fill="#1C2A4E"/>
      <rect x="14" y="34" width="10" height="10" rx="2" fill="#1C2A4E"/>
      <rect x="26" y="34" width="10" height="10" rx="2" fill="#1C2A4E"/>
      <rect x="38" y="34" width="10" height="10" rx="2" fill="#1C2A4E"/>
    </g>

    <!-- top layer -->
    <g>
      <rect x="14" y="10" width="10" height="10" rx="2" fill="url(#violet)"/>
      <rect x="26" y="10" width="10" height="10" rx="2" fill="url(#violet)"/>
      <rect x="38" y="10" width="10" height="10" rx="2" fill="#223055"/>

      <rect x="14" y="22" width="10" height="10" rx="2" fill="url(#indigo)"/>
      <rect x="26" y="22" width="10" height="10" rx="2" fill="#223055"/>
      <rect x="38" y="22" width="10" height="10" rx="2" fill="#223055"/>

      <rect x="14" y="34" width="10" height="10" rx="2" fill="#223055"/>
      <rect x="26" y="34" width="10" height="10" rx="2" fill="#223055"/>
      <rect x="38" y="34" width="10" height="10" rx="2" fill="#223055"/>
    </g>
  </g>
</svg>
